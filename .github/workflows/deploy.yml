name: Classement MPP -> Azure Static Web Apps

# ============================================================================
# CUTOFF : date d'arret automatique du pipeline (format AAAA-MM-JJ, en UTC).
# A partir de cette date (incluse), le job se desactive tout seul.
# >>> Pour prolonger/raccourcir : changer UNIQUEMENT cette valeur. <<<
# ============================================================================
env:
  CUTOFF: "2026-08-01"

on:
  schedule:
    # Une seule mise a jour par jour, le matin, lundi -> vendredi.
    # ATTENTION : le cron GitHub est en UTC. "0 5 * * 1-5" correspond a
    # 7h Paris en ete (UTC+2) et 6h Paris en hiver (UTC+1). Le passage
    # heure d'hiver/ete n'est PAS gere par le cron (decalage assume).
    # La periode d'exploitation (cf. CUTOFF) etant en ete, on vise 7h pile.
    - cron: "0 5 * * 1-5"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  actions: write              # requis pour `gh workflow disable` (arret auto)

concurrency:
  group: deploy-mpp           # serialise les runs (evite une course sur le refresh token)
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # --- Garde : arret automatique a partir du CUTOFF -------------------
      # Compare la date du jour (UTC) a CUTOFF. Si on a atteint/depasse le
      # cutoff : desactive le workflow lui-meme et positionne stop=true.
      # La sortie reste PROPRE (pas d'echec rouge) : les etapes suivantes
      # sont simplement court-circuitees via `if: steps.guard.outputs.stop`.
      - name: Garde anti-cutoff (arret auto)
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TODAY="$(date -u +%F)"
          echo "Date du jour (UTC) : $TODAY  |  CUTOFF : $CUTOFF"
          # Les dates ISO (AAAA-MM-JJ) se comparent correctement en ordre lexical.
          if [[ ! "$TODAY" < "$CUTOFF" ]]; then
            echo "::warning::Date du jour ($TODAY) >= CUTOFF ($CUTOFF) : arret automatique du pipeline."
            echo "stop=true" >> "$GITHUB_OUTPUT"
            if gh workflow disable deploy.yml; then
              echo "Workflow 'deploy.yml' desactive avec succes. Plus aucun run programme ne partira."
            else
              echo "::error::Echec de 'gh workflow disable'. Le GITHUB_TOKEN n'a probablement pas la permission Actions: write (reglage d'org)."
              echo "::error::ACTION REQUISE : etendre le secret GH_PAT a la permission Actions: write, puis relancer (ou desactiver le workflow a la main)."
            fi
          else
            echo "Avant CUTOFF : execution normale."
            echo "stop=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.stop != 'true'
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.stop != 'true'
        with:
          node-version: 20

      - name: Build de la page classement
        if: steps.guard.outputs.stop != 'true'
        env:
          # --- secret ---
          MPP_REFRESH_TOKEN: ${{ secrets.MPP_REFRESH_TOKEN }}
          # --- variables (non sensibles) ---
          MPP_CHALLENGE_ID: ${{ vars.MPP_CHALLENGE_ID }}     # ex: mpp_challenge_UD61EVJZ
          MPP_LEAGUE_NAME: ${{ vars.MPP_LEAGUE_NAME }}
          MPP_ROWS_PER_PAGE: ${{ vars.MPP_ROWS_PER_PAGE }}
          # surcharges optionnelles :
          MPP_CLIENT_ID: ${{ vars.MPP_CLIENT_ID }}
          MPP_API_BASE: ${{ vars.MPP_API_BASE }}
          MPP_TOKEN_URL: ${{ vars.MPP_TOKEN_URL }}
          # rotation : on capte le refresh token renouvele ici
          MPP_REFRESH_OUT: new_refresh_token.txt
        run: node src/build.mjs

      # REQUIS (rotation active) : repousse le refresh token renouvele dans le secret.
      # always() => s'execute meme si le build echoue APRES le refresh, sinon le
      # token tourne serait perdu et le run suivant casserait. Necessite GH_PAT.
      - name: Persister le refresh token renouvele
        if: ${{ steps.guard.outputs.stop != 'true' && always() && hashFiles('new_refresh_token.txt') != '' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set MPP_REFRESH_TOKEN --body "$(cat new_refresh_token.txt)"
          echo "Refresh token mis a jour dans les secrets."

      # Ne deploie que si le build a reussi (sinon le dernier site valide reste en ligne).
      - name: Deploiement Azure Static Web Apps
        if: steps.guard.outputs.stop != 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist          # contenu deja construit
          output_location: ""
          skip_app_build: true        # pas de build Oryx, on uploade tel quel
          skip_api_build: true
